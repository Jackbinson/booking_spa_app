services:
  api:
    build: .
    container_name: spa_booking_api
    command: pnpm start
    env_file:
      - .env
    environment:
      PORT: 3001
      DATABASE_URL: postgres://spa_user:spa_password@postgres:5432/spa_booking
      REDIS_URL: redis://redis:6379
    ports:
      - '3002:3001'
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    container_name: spa_booking_postgres
    environment:
      POSTGRES_DB: spa_booking
      POSTGRES_USER: spa_user
      POSTGRES_PASSWORD: spa_password
    ports:
      - '15433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spa_user -d spa_booking']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: spa_booking_redis
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
